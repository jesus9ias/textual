name: Deploy blog

# Content pipeline only. This workflow never touches blog/infra (deployed from
# local via cdk) and therefore needs no CloudFormation/CDK permissions — only
# scoped S3 (the single site bucket) + CloudFront (create-invalidation). Path
# filter keeps it isolated to the blog frontend; the checkout still pulls the
# whole repo, since compute-invalidation-paths.mjs reads the invalidation
# manifest at the repo root (outside blog/), written by panel/.
on:
  push:
    branches: [main]
    paths:
      - 'blog/frontend/**'

concurrency:
  group: deploy-blog
  cancel-in-progress: false

defaults:
  run:
    working-directory: blog/frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
      PUBLIC_TEMPLATE: ${{ secrets.PUBLIC_TEMPLATE }}
      SITE_BUCKET_NAME: ${{ secrets.SITE_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blog/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Step 1 — regenerate collection types, validate frontmatter against Zod
      - name: Astro sync
        run: npx astro sync

      # Step 2 — referential-integrity gate (fails the build on any violation)
      - name: Validate content integrity
        run: node scripts/validate-integrity.mjs

      # Step 3 — read the invalidation manifest panel/ writes directly at
      # content-write time (see panel/spec.md), take everything pending since
      # the last publish cut, and union it with the fixed always-invalidate
      # set (home per language, sitemap, robots — see blog/spec.md)
      - name: Compute invalidation paths
        id: invalidation
        run: |
          set -euo pipefail
          RESULT="$(node scripts/compute-invalidation-paths.mjs)"
          echo "paths=$(echo "$RESULT" | jq -r 'join(" ")')" >> "$GITHUB_OUTPUT"

      # Step 4 — build
      - name: Astro build
        run: npx astro build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Steps 5 & 6 — sync the whole build output to the single site bucket.
      # TTL differentiation is done with Cache-Control (CloudFront honors it):
      # hashed immutable assets get a long cache, HTML pages a short one. Two
      # scoped `--delete` passes together prune every removed file.
      - name: Sync to S3
        run: |
          set -euo pipefail
          # Non-HTML (hashed assets, sitemap/rss/robots, images): long, immutable cache.
          aws s3 sync dist/ "s3://${SITE_BUCKET_NAME}/" --delete \
            --exclude "*.html" --cache-control "public,max-age=31536000,immutable"
          # HTML pages: short browser cache (bounds staleness for a returning
          # visitor, since CloudFront invalidation never reaches an already-cached
          # browser copy) but a long CDN cache (invalidation, not natural TTL
          # expiry, is what keeps the edge fresh now — see blog/spec.md Decisions Log).
          aws s3 sync dist/ "s3://${SITE_BUCKET_NAME}/" --delete \
            --exclude "*" --include "*.html" --cache-control "public,max-age=60,s-maxage=604800"

      # Step 7 — invalidation limited to the paths identified in step 3
      - name: Invalidate CloudFront
        run: |
          set -euo pipefail
          PATHS="${{ steps.invalidation.outputs.paths }}"
          if [ -z "$PATHS" ]; then
            echo "No paths to invalidate."
          else
            # shellcheck disable=SC2086
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths $PATHS
          fi
